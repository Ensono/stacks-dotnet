contexts:
  powershell:
    executable:
      bin: docker
      args:
        - run
        - --rm
        - -v
        - ${PWD}:/app
        - -v
        - /var/run/docker.sock:/var/run/docker.sock
        - -e
        - PSModulePath=/modules
        - -w
        - /app
        - --env-file
        - envfile
        - amidostacks/runner-pwsh:0.4.60-stable
        - pwsh
        - -NoProfile
        - -Command
    quote: "'"
    envfile:
      exclude:
        - path
        - sourceversionmessage
        - home
      generate: true

  powershell-python:
    executable:
      bin: docker
      args:
        - run
        - --rm
        - -v
        - ${PWD}:/app
        - -v
        - /var/run/docker.sock:/var/run/docker.sock
        - -e
        - PSModulePath=/modules
        - -w
        - /app
        - --env-file
        - envfile
        - amidostacks/runner-pwsh-python:0.4.60-stable
        - pwsh
        - -NoProfile
        - -Command
    quote: "'"
    envfile:
      exclude:
        - path
        - sourceversionmessage
        - home
      generate: true

  powershell-dotnet:
    executable:
      bin: docker
      args:
        - run
        - --rm
        - -v
        - ${PWD}:/app
        - -v
        - /var/run/docker.sock:/var/run/docker.sock
        - -e
        - PSModulePath=/modules
        - -e
        - JAVA_HOME=/usr/lib/jvm/zulu17-ca
        - -w
        - /app
        - --env-file
        - envfile
        - amidostacks/runner-pwsh-dotnet:0.4.60-stable
        - pwsh
        - -NoProfile
        - -Command
    quote: "'"
    env:
      DOTNET_ARGUMENTS: "-v q /p:CollectCoverage=true /p:CoverletOutputFormat=opencover"
    envfile:
      exclude:
        - path
        - sourceversionmessage
        - home
      generate: true
