contexts:
  powershell:
    container:
      name: ensono/eir-infrastructure:1.2.22
      shell: pwsh
      shell_args:
        - -Command
    envfile:
      exclude:
        - path
        - home
        - kubeconfig

  powershell-dotnet:
    container:
      name: ensono/eir-dotnet:1.2.22
      shell: pwsh
      shell_args:
        - -Command
      volumes:
        - ${DOCKER_JAVA_HOME}:${DOCKER_JAVA_HOME}:ro
    env:
      DOTNET_ARGUMENTS: "-v q /p:CollectCoverage=true /p:CoverletOutputFormat=opencover"
      JAVA_HOME: ${DOCKER_JAVA_HOME}
      PATH: ${DOCKER_JAVA_HOME}/bin:$$PATH
    envfile:
      exclude:
        - path
        - home
        - kubeconfig
