extends: default

yaml-files:
  - '*.yml'
  - '*.yaml'

ignore: |
  .terraform/
  bin/
  obj/
  **/contracts/openapi-v1.yaml
  local/
  deploy/helm/

rules:
  document-start: disable
  line-length: disable
  truthy: disable
  indentation:
    spaces: 2
    indent-sequences: true
    check-multi-line-strings: false
  comments:
    require-starting-space: false
    min-spaces-from-content: 1
  braces:
    min-spaces-inside: 0
    max-spaces-inside: 2
  comments-indentation: false
